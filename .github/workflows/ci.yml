name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build
        env:
          BETTER_AUTH_SECRET: ci-dummy-secret-0000000000000000
          BETTER_AUTH_URL: http://localhost:3000
          DATABASE_URL: postgresql://asep:asep@localhost:5432/asep
          ENGINE_URL: http://localhost:8000
          ENGINE_SERVICE_SECRET: ci-dummy-service-secret-000000000

  engine:
    name: Engine (ruff, pyright, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          # Bootstrap superuser only; the engine connects as the plain asep
          # role created below — superusers bypass row-level security
          # (docs/architecture/ROW_LEVEL_SECURITY.md)
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://asep:asep@localhost:5432/asep
      LLM_FAKE: "1"
      ENGINE_SERVICE_SECRET: ci-dummy-service-secret-000000000
    steps:
      - uses: actions/checkout@v7
      # Mirrors infra/docker/postgres-init: a NOSUPERUSER engine role (RLS is
      # bypassed by superusers) and pgvector in template1, so every database
      # the suite creates inherits the extension
      - name: Create the non-superuser engine role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE ROLE asep LOGIN PASSWORD 'asep' NOSUPERUSER CREATEDB"
          psql -h localhost -U postgres -d template1 -c "CREATE EXTENSION IF NOT EXISTS vector"
          psql -h localhost -U postgres -c "CREATE DATABASE asep OWNER asep"
      # setup-uv publishes no floating major tag — pin the exact release
      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run alembic upgrade head
      - run: uv run pytest

  compose:
    name: Compose config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose -f infra/docker/docker-compose.dev.yml config -q
