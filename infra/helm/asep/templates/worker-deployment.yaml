{{- if .Values.worker.enabled }}
# Same image as the engine, different command: the arq worker drains the run
# queue (RUN_QUEUE=arq) and owns the nightly backup cron when enabled.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asep.fullname" . }}-worker
  labels:
    {{- include "asep.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "asep.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.images.engine.repository }}:{{ .Values.images.engine.tag }}"
          imagePullPolicy: {{ .Values.images.engine.pullPolicy }}
          command: ["arq", "engine.worker.WorkerSettings"]
          envFrom:
            - secretRef:
                name: {{ include "asep.secretName" . }}
          {{- if or .Values.worker.backup.persistence.enabled .Values.worker.sandbox.enabled }}
          env:
            {{- if .Values.worker.backup.persistence.enabled }}
            # Override BACKUP_DIR to the mounted volume so nightly dumps are durable.
            - name: BACKUP_DIR
              value: {{ .Values.worker.backup.persistence.mountPath | quote }}
            {{- end }}
            {{- if .Values.worker.sandbox.enabled }}
            # Drive the DinD sidecar over the pod's shared network namespace.
            - name: SANDBOX_ENABLED
              value: "1"
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            {{- end }}
          {{- end }}
          {{- if .Values.worker.backup.persistence.enabled }}
          volumeMounts:
            - name: backups
              mountPath: {{ .Values.worker.backup.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
        {{- if .Values.worker.sandbox.enabled }}
        # Docker-in-Docker: the QA sandbox's only place to run agent-written
        # tests in-cluster (pods have no host Docker daemon). Privileged — a real
        # security tradeoff, documented in the design note; storage is ephemeral
        # (the sandbox copies the workspace in, keeps nothing). DOCKER_TLS_CERTDIR
        # empty makes dockerd listen on tcp://0.0.0.0:2375 without TLS, reachable
        # only inside this pod.
        - name: dind
          image: {{ .Values.worker.sandbox.dindImage }}
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
          resources:
            {{- toYaml .Values.worker.sandbox.resources | nindent 12 }}
        {{- end }}
      {{- if or .Values.worker.backup.persistence.enabled .Values.worker.sandbox.enabled }}
      volumes:
        {{- if .Values.worker.backup.persistence.enabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "asep.fullname" . }}-worker-backups
        {{- end }}
        {{- if .Values.worker.sandbox.enabled }}
        - name: dind-storage
          emptyDir: {}
        {{- end }}
      {{- end }}
{{- end }}
