{{- if not .Values.existingSecret }}
# One Secret mirrors .env — every workload consumes it via envFrom, so the
# env surface stays identical to .env.example. Operators who manage secrets
# elsewhere set existingSecret instead and this never renders.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "asep.secretName" . }}
  labels:
    {{- include "asep.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
