# Engine schema migrations run before new pods roll, so code never starts
# against an older schema. better-auth's tables are the operator's one-time
# step (pnpm --filter web auth:migrate) — see values.yaml.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "asep.fullname" . }}-migrate
  labels:
    {{- include "asep.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "asep.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.images.engine.repository }}:{{ .Values.images.engine.tag }}"
          imagePullPolicy: {{ .Values.images.engine.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ include "asep.secretName" . }}
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
