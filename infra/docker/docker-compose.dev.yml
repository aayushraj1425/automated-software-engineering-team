name: asep

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      # The bootstrap user must stay a superuser (Postgres insists), so it is
      # NOT the role the engine uses. The init script below creates `asep` as
      # a plain NOSUPERUSER role — superusers bypass row-level security
      # (docs/architecture/ROW_LEVEL_SECURITY.md).
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host port 5433: many dev machines run a local PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # First boot only: creates the non-superuser asep role and its database
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
  redisdata:
  miniodata:
